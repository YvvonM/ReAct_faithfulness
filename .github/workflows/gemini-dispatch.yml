name: '🤖 Gemini Dispatch'

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  pull_request_review_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Pull Request number to review'
        required: false
        type: string

jobs:
  dispatch:
    runs-on: 'ubuntu-latest'
    # Only run on PRs or comments containing @gemini-cli
    if: |
      github.event_name == 'pull_request' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@gemini-cli')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@gemini-cli')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@gemini-cli'))
    permissions:
      contents: 'read'
      pull-requests: 'write'
      issues: 'write'
    steps:
      - name: 'Trigger PR Review'
        uses: 'actions/github-script@v7'
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'gemini-review.yml',
              ref: 'main',
              inputs: {
                additional_context: context.payload.comment?.body || context.payload.review?.body || ''
              }
            });