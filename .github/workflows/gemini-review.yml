name: '🔎 Gemini Review'

on:
  pull_request:
    types: [opened, synchronize]

concurrency:
  group: '${{ github.workflow }}-review-${{ github.event_name }}-${{ github.event.pull_request.number }}'
  cancel-in-progress: true

defaults:
  run:
    shell: 'bash'

jobs:
  review:
    runs-on: 'ubuntu-latest'
    timeout-minutes: 10
    permissions:
      contents: 'read'
      id-token: 'write'
      issues: 'write'
      pull-requests: 'write'

    steps:
      - name: 'Checkout repository'
        uses: 'actions/checkout@v4'
        with:
          fetch-depth: 0

      - name: 'Prevent 429 Rate Limits (Randomized Sleep)'
        run: |
          DELAY=$((10 + RANDOM % 20))
          echo "Sleeping for $DELAY seconds to stagger API requests..."
          sleep $DELAY

      - name: 'Run Gemini pull request review'
        uses: 'google-github-actions/gemini-code-review@v0'
        with:
          gemini_api_key: '${{ secrets.GEMINI_API_KEY }}'
          gemini_model: 'gemini-2.5-flash'
          github_token: '${{ secrets.GITHUB_TOKEN }}'
          pull_request_number: '${{ github.event.pull_request.number }}'
          exclude: 'package-lock.json,yarn.lock,pnpm-lock.yaml,*.min.js,*.dist,*.pstats'